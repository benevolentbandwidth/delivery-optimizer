name: Deploy to GCP
# TODO: uncomment push trigger once Workload Identity Federation is set up with admin
# on:
#   push:
#     branches: [main]
on:
  workflow_dispatch: # manual trigger only for now

permissions:
  contents: read
  id-token: write # required for WIF OIDC

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      osrm: ${{ steps.filter.outputs.osrm }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'deploy/services/http-server.Dockerfile'
              - 'app/api/**'
              - 'libs/**'
              - 'conanfile.py'
              - 'CMakeLists.txt'
              - 'cmake/**'
            osrm:
              - 'deploy/services/osrm.Dockerfile'
              - 'deploy/services/osrm-entrypoint.sh'

  deploy-backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.osrm == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      REGISTRY: us-east1-docker.pkg.dev/b2-delivery-optimizer/services
      REGION: us-east1
      PROJECT_ID: b2-delivery-optimizer
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-east1-docker.pkg.dev --quiet

      - name: Build and push API image
        if: needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          docker build \
            --cache-from "$REGISTRY/deliveryoptimizer-api:cache" \
            --cache-to "$REGISTRY/deliveryoptimizer-api:cache" \
            -f deploy/services/http-server.Dockerfile \
            -t "$REGISTRY/deliveryoptimizer-api:${{ github.sha }}" \
            -t "$REGISTRY/deliveryoptimizer-api:latest" \
            .
          docker push "$REGISTRY/deliveryoptimizer-api:${{ github.sha }}"
          docker push "$REGISTRY/deliveryoptimizer-api:latest"

      - name: Build and push OSRM image
        if: needs.changes.outputs.osrm == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          docker build \
            --cache-from "$REGISTRY/osrm:cache" \
            --cache-to "$REGISTRY/osrm:cache" \
            -f deploy/services/osrm.Dockerfile \
            -t "$REGISTRY/osrm:${{ github.sha }}" \
            -t "$REGISTRY/osrm:latest" \
            .
          docker push "$REGISTRY/osrm:${{ github.sha }}"
          docker push "$REGISTRY/osrm:latest"

      - name: Deploy to Cloud Run
        run: |
          sed "s/:TAG/:${{ github.sha }}/g" infra/cloud-run/service.yaml \
            | gcloud run services replace - \
              --region "$REGION" \
              --project "$PROJECT_ID"
          gcloud run services add-iam-policy-binding deliveryoptimizer \
            --region "$REGION" \
            --member="allUsers" \
            --role="roles/run.invoker" \
            --project "$PROJECT_ID" \
            --quiet || true
