runConfig:
  runtime: nodejs20
  memoryMiB: 512
  concurrency: 100
  minInstances: 0
  maxInstances: 4

env:
  - variable: NEXT_PUBLIC_GOOGLE_MAPS_KEY
    secret: GOOGLE_MAPS_KEY
  - variable: NEXT_PUBLIC_GOOGLE_MAPS_MAP_ID
    secret: GOOGLE_MAPS_MAP_ID
  - variable: DELIVERYOPTIMIZER_API_URL
    # Set via: firebase apphosting:secrets:set DELIVERYOPTIMIZER_API_URL
    # Value: your Cloud Run service URL (e.g. https://<service>.<region>.run.app)
    availability:
      - BUILD
      - RUNTIME
